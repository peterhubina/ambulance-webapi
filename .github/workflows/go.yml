# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Test and Publish WebAPi Container Image

on:
  push:
    branches: [ "main" ]
    tags: [ "v1*" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:  {}

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Get Go version from go.mod
      id: get_go_version
      run: echo "go_version=$(grep -m1 'go ' go.mod | awk '{print $2}')" >> $GITHUB_OUTPUT

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: ${{ steps.get_go_version.outputs.go_version }}

    - name: Generate api controllers interfaces
      uses: craicoverflow/openapi-generator-generate-action@v1.2.1
      with:
        generator: go-gin-server
        input: api/ambulance-wl.openapi.yaml
        additional-properties: apiPath=internal/ambulance_wl,packageName=ambulance_wl,interfaceOnly=true

    - name: Build
      run: go build -v ./cmd/ambulance-api-service

    - name: Test
      run: go test -v ./...

    - name: Docker Setup QEMU
      uses: docker/setup-qemu-action@v4.0.0
      with:
        # QEMU static binaries Docker image (e.g. tonistiigi/binfmt:latest)
        image: # optional, default is docker.io/tonistiigi/binfmt:latest
        # Platforms to install (e.g. arm64,riscv64,arm)
        platforms: # optional, default is all
        # Cache binfmt image to GitHub Actions cache backend
        cache-image: # optional, default is true

    - name: Docker Setup Buildx
      # You may pin to the exact commit or the version.
      # uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd
      uses: docker/setup-buildx-action@v4.0.0
      with:
        # Buildx version. (eg. v0.3.0)
        version: # optional
        # Sets the builder driver to be used
        driver: # optional, default is docker-container
        # List of additional driver-specific options. (eg. image=moby/buildkit:master)
        driver-opts: # optional
        # BuildKit daemon flags
        buildkitd-flags: # optional
        # BuildKit daemon config file
        buildkitd-config: # optional
        # Inline BuildKit daemon config
        buildkitd-config-inline: # optional
        # Switch to this builder instance
        use: # optional, default is true
        # Name of the builder. If not specified, one will be generated or if it already exists, it will be used instead of creating a new one.
        name: # optional
        # Optional address for docker socket or context from `docker context ls`
        endpoint: # optional
        # Fixed platforms for current node. If not empty, values take priority over the detected ones
        platforms: # optional
        # Append additional nodes to the builder
        append: # optional
        # Keep BuildKit state on cleanup. This is only useful on persistent self-hosted runners.
        keep-state: # optional, default is false
        # Cache buildx binary to GitHub Actions cache backend
        cache-binary: # optional, default is true
        # Cleanup temp files and remove builder at the end of a job
        cleanup: # optional, default is true

    - name: Docker Metadata action
      # You may pin to the exact commit or the version.
      # uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf
      uses: docker/metadata-action@v6.0.0
      with:
        # Where to get context data. Allowed options are "workflow"  (default), "git".
        context: # default is workflow
        # List of Docker images to use as base name for tags
        images: # optional
        # List of tags as key-value pair attributes
        tags: # optional
        # Flavors to apply
        flavor: # optional
        # List of custom labels
        labels: # optional
        # List of custom annotations
        annotations: # optional
        # Separator to use for tags output (default \n)
        sep-tags: # optional
        # Separator to use for labels output (default \n)
        sep-labels: # optional
        # Separator to use for annotations output (default \n)
        sep-annotations: # optional
        # Bake target name (default docker-metadata-action)
        bake-target: # optional
        # GitHub Token as provided by secrets
        github-token: # default is ${{ github.token }}

    - name: Docker Login
      # You may pin to the exact commit or the version.
      # uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2
      uses: docker/login-action@v4.0.0
      with:
        # Server address of Docker registry. If not set then will default to Docker Hub
        registry: # optional
        # Username used to log against the Docker registry
        username: # optional
        # Password or personal access token used to log against the Docker registry
        password: # optional
        # Specifies whether the given registry is ECR (auto, true or false)
        ecr: # optional
        # Scope for the authentication token
        scope: # optional
        # Log out from the Docker registry at the end of a job
        logout: # optional, default is true
        # Raw authentication to registries, defined as YAML objects
        registry-auth: # optional

    - name: Build and push Docker images
      # You may pin to the exact commit or the version.
      # uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294
      uses: docker/build-push-action@v7.0.0
      with:
        # List of a customs host-to-IP mapping (e.g., docker:10.180.0.1)
        add-hosts: # optional
        # List of extra privileged entitlement (e.g., network.host,security.insecure)
        allow: # optional
        # List of annotation to set to the image
        annotations: # optional
        # List of attestation parameters (e.g., type=sbom,generator=image)
        attests: # optional
        # List of build-time variables
        build-args: # optional
        # List of additional build contexts (e.g., name=path)
        build-contexts: # optional
        # Builder instance
        builder: # optional
        # List of external cache sources for buildx (e.g., user/app:cache, type=local,src=path/to/dir)
        cache-from: # optional
        # List of cache export destinations for buildx (e.g., user/app:cache, type=local,dest=path/to/dir)
        cache-to: # optional
        # Set method for evaluating build (e.g., check)
        call: # optional
        # Optional parent cgroup for the container used in the build
        cgroup-parent: # optional
        # Build's context is the set of files located in the specified PATH or URL
        context: # optional
        # Path to the Dockerfile
        file: # optional
        # List of metadata for an image
        labels: # optional
        # Load is a shorthand for --output=type=docker
        load: # optional, default is false
        # Set the networking mode for the RUN instructions during build
        network: # optional
        # Do not use cache when building the image
        no-cache: # optional, default is false
        # Do not cache specified stages
        no-cache-filters: # optional
        # List of output destinations (format: type=local,dest=path)
        outputs: # optional
        # List of target platforms for build
        platforms: # optional
        # Generate provenance attestation for the build (shorthand for --attest=type=provenance)
        provenance: # optional
        # Always attempt to pull all referenced images
        pull: # optional, default is false
        # Push is a shorthand for --output=type=registry
        push: # optional, default is false
        # Generate SBOM attestation for the build (shorthand for --attest=type=sbom)
        sbom: # optional
        # List of secrets to expose to the build (e.g., key=string, GIT_AUTH_TOKEN=mytoken)
        secrets: # optional
        # List of secret env vars to expose to the build (e.g., key=envname, MY_SECRET=MY_ENV_VAR)
        secret-envs: # optional
        # List of secret files to expose to the build (e.g., key=filename, MY_SECRET=./secret.txt)
        secret-files: # optional
        # Size of /dev/shm (e.g., 2g)
        shm-size: # optional
        # List of SSH agent socket or keys to expose to the build
        ssh: # optional
        # List of tags
        tags: # optional
        # Sets the target stage to build
        target: # optional
        # Ulimit options (e.g., nofile=1024:1024)
        ulimit: # optional
        # GitHub Token used to authenticate against a repository for Git context
        github-token: # optional, default is ${{ github.token }}
            
